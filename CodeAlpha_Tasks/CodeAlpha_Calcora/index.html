<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcora</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">

        <h1 class="logo">Calcora</h1>

        <button id="themeToggle" class="theme-toggle">
            🌙
        </button>

    </div>

    <!-- CALCULATOR -->
    <div class="calculator">

        <!-- HISTORY -->
        <div class="history-section">

            <div class="history-header">

                <span>History</span>

                <button id="clearHistory" class="clear-history">
                    🗑
                </button>

            </div>

            <div id="historyList" class="history-list"></div>

        </div>

        <!-- DISPLAY -->
        <div class="display">

            <div id="expression" class="expression"></div>

            <div id="result" class="result">0</div>

        </div>

        <!-- NORMAL BUTTONS -->
        <div class="buttons">

            <button class="btn danger" data-action="clear">AC</button>
            <button class="btn" data-action="delete">DEL</button>
            <button class="btn operator" data-value="%">%</button>
            <button class="btn operator" data-value="/">÷</button>

            <button class="btn" data-value="7">7</button>
            <button class="btn" data-value="8">8</button>
            <button class="btn" data-value="9">9</button>
            <button class="btn operator" data-value="*">×</button>

            <button class="btn" data-value="4">4</button>
            <button class="btn" data-value="5">5</button>
            <button class="btn" data-value="6">6</button>
            <button class="btn operator" data-value="-">−</button>

            <button class="btn" data-value="1">1</button>
            <button class="btn" data-value="2">2</button>
            <button class="btn" data-value="3">3</button>
            <button class="btn operator" data-value="+">+</button>

            <button class="btn zero" data-value="0">0</button>

            <button class="btn" data-value=".">.</button>

            <button class="btn equal" data-action="equals">=</button>

        </div>

        <!-- SCI TOGGLE -->
        <button
            id="scientificToggle"
            class="btn scientific-btn">
            ⚗ SCIENTIFIC
        </button>

        <!-- SCIENTIFIC PANEL -->
        <div id="scientificPanel" class="scientific-panel">

            <button class="btn sci-btn" data-sci="sqrt">√</button>

            <button class="btn sci-btn" data-sci="square">x²</button>

            <button class="btn sci-btn" data-sci="sin">sin</button>

            <button class="btn sci-btn" data-sci="cos">cos</button>

            <button class="btn sci-btn" data-sci="tan">tan</button>

            <button class="btn sci-btn" data-sci="log">log</button>

            <button class="btn sci-btn" data-sci="pi">π</button>

            <button class="btn sci-btn" data-sci="e">e</button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
