<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GalleryX</title>

    <link rel="stylesheet" href="style.css" />

    <!-- Icons -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
</head>
<body class="dark-theme">

    <!-- =========================
         APP CONTAINER
    ========================== -->
    <div class="app">

        <!-- =========================
             SIDEBAR
        ========================== -->
        <aside class="sidebar" id="sidebar">

            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fa-regular fa-images"></i>
                </div>

                <div class="logo-text">
                    <h1>GalleryX</h1>
                    <p>Media Manager</p>
                </div>
            </div>

            <nav class="sidebar-nav">

                <button class="nav-item active" data-section="all">
                    <i class="fa-solid fa-layer-group"></i>
                    <span>All Media</span>
                </button>

                <button class="nav-item" data-section="images">
                    <i class="fa-regular fa-image"></i>
                    <span>Images</span>
                </button>

                <button class="nav-item" data-section="gifs">
                    <i class="fa-solid fa-film"></i>
                    <span>GIFs</span>
                </button>

                <button class="nav-item" data-section="videos">
                    <i class="fa-solid fa-video"></i>
                    <span>Videos</span>
                </button>

                <button class="nav-item" data-section="albums">
                    <i class="fa-regular fa-folder"></i>
                    <span>Albums</span>
                </button>

                <button class="nav-item" data-section="favorites">
                    <i class="fa-regular fa-star"></i>
                    <span>Favorites</span>
                </button>

                <button class="nav-item" data-section="trash">
                    <i class="fa-regular fa-trash-can"></i>
                    <span>Trash</span>
                </button>

            </nav>

            <div class="sidebar-footer">

                <div class="storage-card">
                    <div class="storage-top">
                        <span>Storage</span>
                        <span id="mediaCount">0 Files</span>
                    </div>

                    <div class="storage-bar">
                        <div class="storage-progress"></div>
                    </div>
                </div>

            </div>

        </aside>

        <!-- =========================
             MAIN CONTENT
        ========================== -->
        <main class="main-content">

            <!-- =========================
                 TOPBAR
            ========================== -->
            <header class="topbar">

                <div class="left-topbar">

                    <button
                        class="mobile-menu-btn"
                        id="mobileMenuBtn"
                        aria-label="Open Menu"
                    >
                        <i class="fa-solid fa-bars"></i>
                    </button>

                    <div class="search-wrapper">

                        <i class="fa-solid fa-magnifying-glass"></i>

                        <input
                            type="text"
                            id="searchInput"
                            placeholder="Search media, albums, tags..."
                        />

                    </div>

                </div>

                <div class="right-topbar">

                    <button class="action-btn" id="selectModeBtn">
                        <i class="fa-solid fa-check-double"></i>
                        <span>Select</span>
                    </button>

                    <button class="action-btn" id="themeToggle">
                        <i class="fa-solid fa-moon"></i>
                        <span>Theme</span>
                    </button>

                    <button class="upload-btn" id="uploadTrigger">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <span>Upload</span>
                    </button>

                    <input
                        type="file"
                        id="fileInput"
                        hidden
                        multiple
                        accept="image/*,video/*,.gif"
                    />

                </div>

            </header>

            <!-- =========================
                 PAGE HEADER
            ========================== -->
            <section class="page-header">

                <div>
                    <h2 id="sectionTitle">All Media</h2>
                    <p id="sectionDescription">
                        Manage images, GIFs and videos from one place.
                    </p>
                </div>

                <div class="view-actions">

                    <button class="view-btn active">
                        <i class="fa-solid fa-grip"></i>
                    </button>

                    <button class="view-btn">
                        <i class="fa-solid fa-list"></i>
                    </button>

                </div>

            </section>

            <!-- =========================
                 DRAG & DROP ZONE
            ========================== -->
            <section class="dropzone" id="dropzone">

                <div class="dropzone-content">

                    <div class="drop-icon">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                    </div>

                    <h3>Drag & Drop Media Here</h3>

                    <p>
                        Upload Images, GIFs and Videos
                    </p>

                    <button class="dropzone-btn" id="uploadDropBtn">
                        Select Files
                    </button>

                </div>

            </section>

            <!-- =========================
                 EMPTY STATE
            ========================== -->
            <section class="empty-state" id="emptyState">

                <div class="empty-icon">
                    <i class="fa-regular fa-images"></i>
                </div>

                <h2>No Media Available</h2>

                <p>
                    Upload your first image, GIF or video to start building
                    your personal gallery.
                </p>

                <button class="empty-upload-btn" id="emptyUploadBtn">
                    <i class="fa-solid fa-plus"></i>
                    Upload Media
                </button>

            </section>

            <!-- =========================
                 GALLERY GRID
            ========================== -->
            <section
                class="gallery-grid hidden"
                id="galleryGrid"
            >
                <!-- Dynamic Cards From JS -->
            </section>

        </main>

    </div>

    <!-- =========================
         MOBILE OVERLAY
    ========================== -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- =========================
         TOAST CONTAINER
    ========================== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- =========================
         IMAGE LIGHTBOX
    ========================== -->
    <div class="lightbox" id="lightbox">

        <button class="lightbox-close">
            <i class="fa-solid fa-xmark"></i>
        </button>

        <button class="lightbox-prev">
            <i class="fa-solid fa-chevron-left"></i>
        </button>

        <div class="lightbox-content">

            <img
                id="lightboxImage"
                src=""
                alt="Preview"
            />

        </div>

        <button class="lightbox-next">
            <i class="fa-solid fa-chevron-right"></i>
        </button>

    </div>

    <!-- =========================
         CONTEXT MENU
    ========================== -->
    <div class="context-menu" id="contextMenu">

        <button>
            <i class="fa-regular fa-eye"></i>
            Open
        </button>

        <button>
            <i class="fa-regular fa-star"></i>
            Favorite
        </button>

        <button>
            <i class="fa-regular fa-pen-to-square"></i>
            Rename
        </button>

        <button>
            <i class="fa-regular fa-folder-open"></i>
            Move
        </button>

        <button>
            <i class="fa-regular fa-copy"></i>
            Copy
        </button>

        <button>
            <i class="fa-solid fa-download"></i>
            Download
        </button>

        <button>
            <i class="fa-regular fa-circle-info"></i>
            Details
        </button>

        <button class="danger-action">
            <i class="fa-regular fa-trash-can"></i>
            Delete
        </button>

    </div>

    <script src="script.js"></script>

</body>
</html>
